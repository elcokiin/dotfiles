# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT ALT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT ALT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, Gemini, exec, omarchy-launch-webapp "https://gemini.google.com"
bindd = SUPER SHIFT ALT, A, Claude, exec, omarchy-launch-webapp "https://claude.ai/new"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://calendar.google.com/calendar/u/1/r?pli=1"
bindd = SUPER SHIFT ALT, C, Chess, exec, omarchy-launch-webapp "https://chess.com"
bindd = SUPER SHIFT ALT, E, Email, exec, omarchy-launch-webapp "https://mail.google.com/mail/u/1/##inbox"
bindd = SUPER SHIFT, E, Excalidraw, exec, omarchy-launch-webapp "https://excalidraw.com/"
bindd = SUPER SHIFT ALT, F, Fast Finger Test, exec, omarchy-launch-webapp "https://beta.10fastfingers.com/typing-test"
bindd = SUPER SHIFT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT ALT, M, Moodle, exec, omarchy-launch-webapp "https://moodle2.uptc.edu.co/presencial/"
bindd = SUPER SHIFT, N, Notion, exec, omarchy-launch-webapp "https://www.notion.so/6db2e962e0c74867b6d790bfa9749bb5"
bindd = SUPER SHIFT, O, Remnote, exec, omarchy-launch-webapp "https://www.remnote.com/w/627812d7e202a30016685473/notes~"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# System bindings
bindd = SUPER, C, Clipboard, exec, walker --provider clipboard
bindd = SUPER ALT, C, Clipboard, exec, walker --provider calc
bindd = SUPER SHIFT, S, Screenshot, exec, omarchy-cmd-screenshot

# Toggle keyboard layout (Fcitx5) with Caps Lock
bind = , CAPSLOCK, exec, $HOME/.config/fcitx5/toggle-layout.sh
