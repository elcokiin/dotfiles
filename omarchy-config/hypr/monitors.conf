# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# --- MAIN MONITOR CONFIGURATION ---
# Custom scale for "less zoom" (Adjust 1.25 down to 1 if you want it even smaller)
monitor=,preferred,auto,1.25

# Optional: If older GTK apps look blurry with fractional scaling, you can force them to scale:
# env = GDK_SCALE,1


# --- LAPTOP LID BEHAVIOR ---
# Trigger when the switch is turning on (Laptop closed)
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"

# Trigger when the switch is turning off (Laptop opened)
# Note: The scale here matches the main monitor scale above!
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 1.25"


# --- MANUAL MONITOR TOGGLES ---
# Disable laptop monitor manually
# bind = SUPER SHIFT, D, exec, hyprctl keyword monitor eDP-1, disable

# Enable laptop monitor manually
# bind = SUPER SHIFT ALT, D, exec, hyprctl keyword monitor eDP-1, preferred, auto, 1.25


# --- TEMPLATE EXAMPLES FOR EXTERNAL MONITORS ---
# Portrait/rotated secondary monitor (transform: 1 = 90°, 3 = 270°)
# monitor = DP-2, preferred, auto, 1, transform, 1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2
